worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver — fuerza re-resolución en cada request
    # para que round-robin funcione cuando hay múltiples réplicas del orquestador
    resolver 127.0.0.11 valid=5s ipv6=off;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Timeouts: el micro-coincidencias puede tardar hasta 30 s (inferencia ML)
    proxy_connect_timeout  10s;
    proxy_send_timeout     35s;
    proxy_read_timeout     35s;

    server {
        listen 80;

        location / {
            # Variable fuerza re-resolución DNS por request (round-robin entre réplicas)
            set $backend orquestador;
            proxy_pass http://$backend:8080;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Desactivar buffering para SSE y streaming
            proxy_buffering off;
            proxy_cache     off;
        }
    }
}
