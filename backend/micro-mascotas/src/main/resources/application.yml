server:
  port: 8082

spring:
  application:
    name: micro-mascotas

  # ── PostgreSQL (escritura) ──────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/sanos_salvos}
    username: ${POSTGRES_USER:ss_admin}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── MongoDB (lectura) ───────────────────────────────────────
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://ss_admin:changeme@localhost:27017/sanos_salvos_read?authSource=admin}

  # ── Kafka ───────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: ss-mascotas-sync
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # ── Subida de archivos ──────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

# ── JWT ────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:ss_minio_admin}
    secret-key: ${MINIO_ROOT_PASSWORD:changeme}
    bucket: ${MINIO_BUCKET_FOTOS:fotos-mascotas}

  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:4321}

# ── Swagger UI ───────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ─────────────────────────────────────────────────
logging:
  level:
    cl.sanosysalvos: DEBUG
    org.springframework.kafka: WARN
    io.minio: WARN
