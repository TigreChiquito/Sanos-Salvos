apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-usuarios
  namespace: sanos-salvos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-usuarios
  template:
    metadata:
      labels:
        app: micro-usuarios
    spec:
      containers:
        - name: micro-usuarios
          image: ss-micro-usuarios:latest
          imagePullPolicy: Never
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: POSTGRES_URL_JDBC
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MS
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_EXPIRATION_MS
            - name: FRONTEND_URL
              value: http://localhost:4321
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: micro-usuarios
  namespace: sanos-salvos
spec:
  selector:
    app: micro-usuarios
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
