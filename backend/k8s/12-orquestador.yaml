apiVersion: apps/v1
kind: Deployment
metadata:
  name: orquestador
  namespace: sanos-salvos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orquestador
  template:
    metadata:
      labels:
        app: orquestador
    spec:
      containers:
        - name: orquestador
          image: ss-orquestador:latest
          imagePullPolicy: Never
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MS
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_EXPIRATION_MS
            - name: FRONTEND_URL
              value: http://localhost:4321
            - name: APP_PUBLIC_PATHS
              value: "/oauth2/**,/login/oauth2/**,/api/auth/logout,/fallback/**,/actuator/health,/actuator/prometheus,/actuator/metrics/**,/swagger-ui/**,/api-docs/**"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orquestador
  namespace: sanos-salvos
spec:
  selector:
    app: orquestador
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
