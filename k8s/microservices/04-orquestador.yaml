apiVersion: apps/v1
kind: Deployment
metadata:
  name: orquestador
  namespace: sanos-salvos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orquestador
  template:
    metadata:
      labels:
        app: orquestador
    spec:
      containers:
        - name: orquestador
          image: ss-orquestador:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION_MS
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_EXPIRATION_MS
            - name: FRONTEND_URL
              value: http://localhost:4321
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 640Mi
              cpu: 750m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: orquestador
  namespace: sanos-salvos
spec:
  selector:
    app: orquestador
  ports:
    - port: 8080
      targetPort: 8080
