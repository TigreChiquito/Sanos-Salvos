apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-mascotas
  namespace: sanos-salvos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-mascotas
  template:
    metadata:
      labels:
        app: micro-mascotas
    spec:
      containers:
        - name: micro-mascotas
          image: ss-micro-mascotas:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/sanos_salvos
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: POSTGRES_PASSWORD
            - name: MONGO_URL
              value: mongodb://ss_admin:ss_dev_password_2024@mongodb:27017/sanos_salvos_read?authSource=admin
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka-0.kafka-hs.sanos-salvos.svc.cluster.local:9092
            - name: MINIO_ENDPOINT
              value: http://minio:9000
            - name: MINIO_PUBLIC_URL
              value: http://localhost:30900
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET_FOTOS
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: MINIO_BUCKET_FOTOS
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ss-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: http://localhost:4321
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 640Mi
              cpu: 750m
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: micro-mascotas
  namespace: sanos-salvos
spec:
  selector:
    app: micro-mascotas
  ports:
    - port: 8082
      targetPort: 8082
