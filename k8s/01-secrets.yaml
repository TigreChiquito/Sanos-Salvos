apiVersion: v1
kind: Secret
metadata:
  name: ss-secrets
  namespace: sanos-salvos
type: Opaque
stringData:
  # ── PostgreSQL ────────────────────────────────────────────
  POSTGRES_DB: sanos_salvos
  POSTGRES_USER: ss_admin
  POSTGRES_PASSWORD: ss_dev_password_2024

  # ── MongoDB ───────────────────────────────────────────────
  MONGO_ROOT_USER: ss_admin
  MONGO_ROOT_PASSWORD: ss_dev_password_2024
  MONGO_DB: sanos_salvos_read

  # ── MinIO ─────────────────────────────────────────────────
  MINIO_ROOT_USER: ss_minio_admin
  MINIO_ROOT_PASSWORD: ss_minio_password_2024
  MINIO_BUCKET_FOTOS: fotos-mascotas

  # ── JWT ──────────────────────────────────────────────────
  JWT_SECRET: dev-jwt-secret-sanos-salvos-kubernetes-2024-must-be-long-enough
  JWT_EXPIRATION_MS: "86400000"

  # ── Google OAuth2 (reemplazar con credenciales reales) ────
  GOOGLE_CLIENT_ID: your_google_client_id.apps.googleusercontent.com
  GOOGLE_CLIENT_SECRET: your_google_client_secret
